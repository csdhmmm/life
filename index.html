<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>小问卷</title>
  <style>
    :root{--card:#111b2e;--text:#e7eefc;--muted:#a9b6d3;--btn:#2a68ff;--btn2:#243055;--line:rgba(255,255,255,.08);--good:#2ee59d;--bad:#ff4d6d}
    *{box-sizing:border-box}
    body{margin:0;background:linear-gradient(180deg,#071027,#0b1220);color:var(--text);
      font-family:system-ui,-apple-system,Segoe UI,Roboto,"PingFang SC","Microsoft YaHei",sans-serif}
    .wrap{max-width:900px;margin:22px auto;padding:0 16px}
    h1{margin:0 0 6px}
    .sub{color:var(--muted);line-height:1.6;margin:0 0 14px}
    .card{background:rgba(17,27,46,.92);border:1px solid var(--line);border-radius:14px;padding:16px}
    .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
    input[type="text"]{flex:1;max-width:320px;padding:10px;border-radius:12px;border:1px solid var(--line);background:rgba(255,255,255,.05);color:var(--text)}
    .q{padding:14px 0;border-top:1px solid var(--line)}
    .q:first-child{border-top:0}
    .qt{font-weight:900}
    .opts{display:grid;gap:10px;margin-top:10px}
    label{display:flex;gap:10px;align-items:flex-start;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.06);
      padding:10px 12px;border-radius:12px;cursor:pointer}
    input{margin-top:3px}
    button{border:0;border-radius:12px;padding:12px 14px;background:var(--btn2);color:var(--text);font-weight:900;cursor:pointer}
    button.primary{background:var(--btn)}
    button:disabled{opacity:.5;cursor:not-allowed}
    .result{margin-top:14px;padding:14px;border-radius:14px;border:1px solid var(--line);background:rgba(255,255,255,.04)}
    .score{font-size:34px;font-weight:1000}
    .pill{display:inline-block;padding:6px 10px;border-radius:999px;background:rgba(46,229,157,.18);color:var(--good);font-weight:900}
    .muted{color:var(--muted)}
    .err{color:var(--bad);font-weight:900}
  </style>
</head>
<body>
<div class="wrap">
  <h1>小问卷</h1>
  <p class="sub">请先输入你的称呼，然后完成 20 题。提交后会生成一个结果。</p>

  <div class="card">
    <!-- 前置：输入称呼 -->
    <div id="pre">
      <div class="row" style="justify-content:space-between">
        <div class="muted">请输入你的称呼：</div>
        <input id="name" type="text" maxlength="20" placeholder="比如：小明" />
        <button class="primary" id="start">开始答题</button>
      </div>
      <p class="muted" style="margin:10px 0 0">提示：提交后同一设备只能提交一次。</p>
      <p id="preErr" class="err" style="margin-top:10px"></p>
    </div>

    <!-- 锁定提示 -->
    <div id="locked" class="result" hidden>
      <div class="muted">你已经提交过一次啦（本设备）。</div>
      <div class="score"><span id="lockedPct">--</span>%</div>
      <div class="pill" id="lockedBadge"></div>
      <div class="muted" style="margin-top:8px">谢谢参与～</div>
    </div>

    <!-- 正式问卷 -->
    <div id="form" hidden>
      <div id="quiz"></div>

      <div class="row" style="margin-top:14px">
        <button class="primary" id="submit">提交</button>
        <span id="status" class="muted"></span>
      </div>
      <p id="error" class="err" style="margin-top:12px"></p>

      <div id="result" class="result" hidden>
        <div class="muted">你的结果：</div>
        <div class="score"><span id="pct">70</span>%</div>
        <div class="pill" id="badge">默契度还可以</div>
        <div class="muted" style="margin-top:8px">谢谢你认真作答！</div>
      </div>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

/** 你的 Firebase 配置（已按你发的内容填好） */
const firebaseConfig = {
  apiKey: "AIzaSyAaBNaiA9CRHgea6b4huJmRihsRdzrEFl8",
  authDomain: "friend-quiz-c6a8b.firebaseapp.com",
  projectId: "friend-quiz-c6a8b",
  storageBucket: "friend-quiz-c6a8b.firebasestorage.app",
  messagingSenderId: "1081335961814",
  appId: "1:1081335961814:web:5686ad4d7a08e3246f5177",
  measurementId: "G-31VZSML6ZJ"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const QUESTIONS = [
  { id:"q1", text:"在一段关系中，你认为“被爱”最核心的体现是？", options:["对方愿意为你花大量时间","对方能记住并理解你的情绪","对方在重要选择上优先考虑你","对方愿意为你改变自己"] },
  { id:"q2", text:"当你向另一半倾诉烦恼时，你最希望他做的第一件事是？", options:["安静听完，抱抱你","帮你分析问题，给出建议","陪你一起骂让你生气的人/事","说“没关系，有我在”"] },
  { id:"q3", text:"你认为“安全感”在关系里主要来自哪里？", options:["对方主动报备行踪和社交","对方言出必行，小事也不敷衍","即使吵架，也从不说伤人的话","对方的未来计划里明确有你"] },
  { id:"q4", text:"你更能接受以下哪种“不完美”？", options:["对方偶尔忘记重要日期","对方收入暂时不高但努力","对方不擅长浪漫和惊喜","对方有自己很坚持的小癖好"] },
  { id:"q5", text:"对于“共同进步”，你的真实态度是？", options:["必须两人步调一致，否则容易散","可以不同步，但要互相支持不拖累","各拼各的，顶峰相见就好","我不需要他多优秀，陪伴更重要"] },
  { id:"q6", text:"当你和另一半意见严重不合时，你最希望最终如何收场？", options:["谁有道理听谁的","他主动让步，哄我一下","各退一步，找折中方案","暂时搁置，不伤感情为先"] },
  { id:"q7", text:"你认为另一半最不该在你们关系中做的事是？", options:["对你撒谎（哪怕是善意的）","在外人面前贬低或忽视你","冷战超过两天不沟通","拿你和别人比较"] },
  { id:"q8", text:"你最希望另一半如何对待你的社交圈（朋友/闺蜜）？", options:["积极融入，成为大家的朋友","保持礼貌距离，不干涉就好","完全信任，不需要过多接触","偶尔一起聚会，但尊重各自空间"] },
  { id:"q9", text:"关于“金钱观”，你最在意对方的是？", options:["愿意为你花钱的程度","是否有储蓄和规划的习惯","不隐瞒收入和债务","消费观与你大致相同（比如该省省该花花）"] },
  { id:"q10", text:"你认为“浪漫”最让你心动的一种形式是？", options:["精心策划的惊喜（如生日派对、旅行）","日常的小动作（倒杯水、盖好被子）","认真听你说话并记住细节","偶尔写一封信或送不贵但有心的礼物"] },
  { id:"q11", text:"当你们进入长期稳定关系后，你最怕出现的感觉是？", options:["无聊，像合租室友","压抑，不敢表达真实想法","被理所当然地忽视","看不到未来的方向"] },
  { id:"q12", text:"如果另一半工作特别忙、持续一个月无法陪你，你希望他怎么做？", options:["提前解释清楚，并给出结束时间","再忙每天也发一条消息或语音","忙完后用整块时间补偿你","带你进入他的工作，让你参与一部分"] },
  { id:"q13", text:"你心里认为“好的伴侣”更像以下哪种角色？", options:["战友——一起打怪升级","港湾——让你安心休息","镜子——帮你看到真实的自己","玩伴——让生活轻松有趣"] },
  { id:"q14", text:"如果满分是10分，你希望你们关系中“独立空间”占几分？", options:["1-2分（几乎完全黏在一起）","3-5分（偶尔各自做事）","6-8分（各有爱好，但常分享）","9-10分（高度独立，精神契合即可）"] },
  { id:"q15", text:"用一句话总结：你最深层的渴望是对方能给你______？", options:["坚定不移的选择","无条件的接纳","持续的成长动力","平淡里的温暖"] },
  { id:"q16", text:"关于家里的整洁程度，你的真实态度是？", options:["必须井井有条，不然会烦躁","差不多就行，一周大扫除一次","乱中有序，我知道东西在哪就行","完全无所谓，开心就好"] },
  { id:"q17", text:"吵完架之后，你更希望对方用什么方式让关系回温？", options:["直接过来说“对不起”，不翻旧账","用行动示好，比如做顿饭或买个奶茶","隔半天再像没事人一样聊别的话题","写一段话把感受说清楚，再一起翻篇"] },
  { id:"q18", text:"你更喜欢对方用哪种方式表达“我想你”？", options:["直接说“我想你了”","发一张正在做的事的照片","突然出现或约你见面","分享一首歌或一段话"] },
  { id:"q19", text:"对于“分享日常小事”，你的态度是？", options:["希望对方事无巨细都跟我分享","有趣或特别的才分享，不用天天报备","不太爱分享琐事，更想聊有深度的","对方主动分享我会开心，但我很少主动"] },
  { id:"q20", text:"如果你在伴侣面前突然哭了，你最不希望对方做的是？", options:["不停问“怎么了”“别哭了”","试图讲道理分析原因","不知所措，愣在原地","说“这有什么好哭的”"] },
];

const LOCK_KEY = "friend_quiz_lock_v1";

const $ = (id)=>document.getElementById(id);
const pre = $("pre");
const preErr = $("preErr");
const form = $("form");
const locked = $("locked");
const lockedPct = $("lockedPct");
const lockedBadge = $("lockedBadge");

function setStatus(t){ $("status").textContent = t || ""; }
function setError(t){ $("error").textContent = t || ""; }

function badgeText(pct){
  return pct >= 80 ? "默契很强" : pct >= 75 ? "默契度不错" : "默契度还可以";
}

function fakeResult(){
  const pool = [70, 75, 80];
  const pct = pool[Math.floor(Math.random() * pool.length)];
  return { pct, badge: badgeText(pct) };
}

function renderQuiz(){
  $("quiz").innerHTML = QUESTIONS.map((q, idx) => {
    const opts = q.options.map((opt, oi) => `
      <label>
        <input type="radio" name="q_${q.id}" value="${oi}">
        <div>${String.fromCharCode(65+oi)}. ${opt}</div>
      </label>
    `).join("");
    return `
      <div class="q">
        <div class="qt">${idx+1}. ${q.text}</div>
        <div class="opts">${opts}</div>
      </div>
    `;
  }).join("");
}

function getAnswers(){
  const ans = {};
  for (const q of QUESTIONS){
    const picked = document.querySelector(`input[name="q_${q.id}"]:checked`);
    ans[q.id] = picked ? Number(picked.value) : null;
  }
  return ans;
}

function allAnswered(answers){
  return QUESTIONS.every(q => answers[q.id] !== null);
}

function loadLock(){
  try{ return JSON.parse(localStorage.getItem(LOCK_KEY) || "null"); }catch(e){ return null; }
}
function saveLock(lock){
  localStorage.setItem(LOCK_KEY, JSON.stringify(lock));
}

function showLocked(lock){
  pre.hidden = true;
  form.hidden = true;
  locked.hidden = false;
  lockedPct.textContent = String(lock.pct);
  lockedBadge.textContent = lock.badge;
}

function showQuiz(){
  pre.hidden = true;
  locked.hidden = true;
  form.hidden = false;
}

$("start").addEventListener("click", () => {
  preErr.textContent = "";
  const name = $("name").value.trim();
  if (!name){
    preErr.textContent = "请先输入称呼。";
    return;
  }
  sessionStorage.setItem("friend_quiz_name_v1", name);
  showQuiz();
});

$("submit").addEventListener("click", async () => {
  setError("");
  setStatus("");

  const lock = loadLock();
  if (lock?.done){
    showLocked(lock);
    return;
  }

  const name = (sessionStorage.getItem("friend_quiz_name_v1") || "").trim();
  if (!name){
    setError("称呼丢失了，请刷新重新输入。");
    return;
  }

  const answers = getAnswers();
  if (!allAnswered(answers)){
    setError("还有题没选完哦，选完才能提交。");
    return;
  }

  const fake = fakeResult();

  const detailed = {};
  for (const q of QUESTIONS){
    const idx = answers[q.id];
    detailed[q.id] = { index: idx, option: q.options[idx], question: q.text };
  }

  $("submit").disabled = true;
  setStatus("提交中…");

  try{
    await addDoc(collection(db, "submissions"), {
      name,
      createdAt: Date.now(),
      ua: navigator.userAgent,
      fakeScore: fake.pct,
      answers,
      detailed
    });

    const lockObj = { done: true, pct: fake.pct, badge: fake.badge };
    saveLock(lockObj);

    $("pct").textContent = String(fake.pct);
    $("badge").textContent = fake.badge;
    $("result").hidden = false;
    setStatus("提交成功，谢谢！");
  }catch(e){
    setError(e?.message || String(e));
  }finally{
    $("submit").disabled = false;
    setStatus("");
  }
});

renderQuiz();
const lock = loadLock();
if (lock?.done) showLocked(lock);
</script>
</body>
</html>
